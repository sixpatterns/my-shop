[tools]
node = "24.14.0"
ruby = "3.4.5"

[env]
_.file = ".env"

[tasks.backend]
dir = "backend"
run = ""

[tasks.frontend]
dir = "frontend"
run = ""

[tasks.codegen]
run = """
cd backend && bundle exec rails runner 'require "graphql/rake_task"; GraphQL::RakeTask.new(schema_name: "BackendSchema", idl_outfile: "../schema.graphql"); Rake::Task["graphql:schema:idl"].invoke'
cd ../frontend && yarn codegen
"""

[tasks.install]
run = [
  { task = "backend bundle install" },
  { task = "frontend yarn install" }
]

[tasks.lint-fix]
run = [
  { task = "backend bundle exec rubocop -A ." },
  { task = "frontend yarn lint --fix" },
  { task = "frontend yarn prettier . --write" },
  { task = "frontend yarn tsc" }
]
